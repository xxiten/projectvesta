# Self-host bundle: the entire platform on one server, no managed cloud.
# Deploy: docker compose -f infra/docker-compose.yml -f infra/docker-compose.app.yml up -d
# (this file adds the application images on top of the infra services)
services:
  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      VESTA_DEPLOYMENT_MODE: self-host
      DATABASE_URL: postgresql://vesta:vesta@postgres:5432/vesta?schema=public
      REDIS_URL: redis://redis:6379
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:?set a strong secret in .env}
      VESTA_ENABLE_DEV_AUTH: ${VESTA_ENABLE_DEV_AUTH:-false}
      API_PORT: '3001'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - '3001:3001'

  worker:
    build:
      context: ..
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_PROXY_TARGET: http://api:3001
    depends_on:
      - api
    ports:
      - '3000:3000'
