openapi: 3.1.0
info:
  title: Vesta API
  version: 0.0.0
  description: >
    Contract-first REST surface for Project Vesta. The typed frontend client is
    generated from this document (`pnpm --filter @vesta/api-contracts generate`).
servers:
  - url: http://localhost:3001
    description: Local development
paths:
  /health:
    get:
      operationId: getHealth
      summary: Liveness/readiness probe
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
components:
  schemas:
    HealthStatus:
      type: object
      required: [status, version]
      properties:
        status:
          type: string
          enum: [ok, degraded]
        version:
          type: string
