name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile=false

      - name: Prisma generate
        run: pnpm --filter @vesta/api prisma:generate

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Module boundaries
        run: pnpm boundaries

      - name: Test
        run: pnpm test
        env:
          # DB integration tests require Docker services; run them in a
          # dedicated job once compose-based services are wired (R2).
          RUN_DB_TESTS: '0'
